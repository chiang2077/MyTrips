    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        {children}
      </a>
    );

    // --- Weather Component ---
    const WeatherWidget = ({ targetDateStr, lat, lon, city, variant = "default" }) => {
      const [weather, setWeather] = useState(null);

      useEffect(() => {
        const fetchWeather = async () => {
          try {
            const today = new Date();
            const targetDate = new Date(targetDateStr);
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays > 14 || diffDays < 0) {
              const isNiigata = city === 'Niigata';
              setWeather({
                isForecast: false,
                max: isNiigata ? 15 : 19,
                min: isNiigata ? 7 : 10,
                code: isNiigata ? 2 : 1
              });
              return;
            }

            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&start_date=${targetDateStr}&end_date=${targetDateStr}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.daily) {
              setWeather({
                isForecast: true,
                max: Math.round(data.daily.temperature_2m_max[0]),
                min: Math.round(data.daily.temperature_2m_min[0]),
                code: data.daily.weathercode[0]
              });
            }
          } catch (err) {
            console.error("Weather fetch failed", err);
          }
        };
        fetchWeather();
      }, [targetDateStr, lat, lon, city]);

      if (!weather) return null;

      const getWeatherDisplay = (code) => {
        const iconSize = variant === 'compact' ? 16 : 20;
        if (code === 0 || code === 1) return { icon: <Sun className="text-yellow-600" size={iconSize} />, label: '晴' };
        if (code === 2 || code === 3) return { icon: <Cloud className="text-stone-500" size={iconSize} />, label: '多雲' };
        if (code >= 50 && code <= 69) return { icon: <CloudRain className="text-blue-600" size={iconSize} />, label: '雨' };
        if (code >= 70 && code <= 79) return { icon: <Snowflake className="text-blue-400" size={iconSize} />, label: '雪' };
        return { icon: <Cloud className="text-stone-500" size={iconSize} />, label: '多雲' };
      };

      const display = getWeatherDisplay(weather.code);

      if (variant === 'compact') {
        return (
          <div className="flex items-center gap-1.5 bg-stone-100/80 px-2 py-1 rounded-md border border-stone-200 shrink-0">
            {display.icon}
            <span className="text-sm font-bold text-stone-700">{weather.max}°<span className="text-xs text-stone-400 font-medium">/{weather.min}°</span></span>
          </div>
        );
      }

      return (
        <div className="flex items-center gap-3 bg-white/80 px-4 py-2 rounded-xl border border-stone-200 shadow-sm">
          {display.icon}
          <div className="flex flex-col">
            <div className="flex items-baseline gap-2">
              <span className="text-base md:text-lg font-bold text-stone-800">{weather.max}°</span>
              <span className="text-sm text-stone-500">/ {weather.min}°C</span>
            </div>
            <span className="text-xs text-stone-500 font-bold tracking-wider uppercase leading-none mt-0.5">
              {weather.isForecast ? '即時預報' : '4月均溫'}
            </span>
          </div>
        </div>
      );
    };

                <div className="flex items-center justify-between gap-3 mb-4">
                  <h3 className="text-lg md:text-xl font-bold text-stone-900">每日重點</h3>
                  <span className="text-sm text-stone-500">點一下可進入當天詳細行程</span>
                </div>

                <div className="md:hidden flex gap-3 overflow-x-auto pb-2 hide-scrollbar snap-x snap-mandatory">
                  {itineraryData.map((day) => (
                    <button
                      key={day.day}
                      className="snap-start shrink-0 w-[88%] text-left bg-stone-50 hover:bg-pink-50 active:bg-pink-50 rounded-2xl border border-stone-200 p-4 transition-colors"
                      onClick={() => { setActiveTab('itinerary'); setTimeout(() => document.getElementById(`day-${day.day}`)?.scrollIntoView({ behavior: 'smooth' }), 120); }}
                    >
                      <div className="flex items-start justify-between gap-3">
                        <div>
                          <div className="text-pink-700 font-extrabold text-lg">Day {day.day}</div>
                          <div className="text-stone-500 text-sm font-medium mt-0.5">{day.date}（{day.weekday}）</div>
                        </div>
                        <WeatherWidget
                          targetDateStr={day.fullDate}
                          lat={day.weatherParam.lat}
                          lon={day.weatherParam.lon}
                          city={day.weatherParam.city}
                          variant="compact"
                        />
                      </div>
                      <h3 className="font-serif-tc text-stone-900 font-bold text-xl mt-4 leading-snug">{day.title}</h3>
                      <div className="flex items-start gap-2 text-stone-600 text-base font-medium mt-3">
                        <MapPin size={18} className="mt-0.5 shrink-0 text-stone-400" />
                        <span>{day.location}</span>
                      </div>
                      <div className="mt-4 pt-4 border-t border-stone-200 text-stone-700 text-[15px] leading-relaxed">
                        {day.note || "查看當日移動、餐食與重點安排。"}
                      </div>
                    </button>
                  ))}
                </div>

                <div className="hidden md:grid md:grid-cols-2 lg:grid-cols-4 gap-4">
                  {itineraryData.map((day) => (
                    <button
                      key={day.day}
                      className="text-left bg-white hover:bg-stone-50 rounded-2xl border border-stone-200 p-5 transition-colors shadow-sm"
                      onClick={() => { setActiveTab('itinerary'); setTimeout(() => document.getElementById(`day-${day.day}`)?.scrollIntoView({ behavior: 'smooth' }), 120); }}
                    >
                      <div className="flex items-start justify-between mb-4">
                        <div>
                          <span className="text-pink-700 font-bold text-xl block mb-0.5">Day {day.day}</span>
                          <span className="text-stone-500 text-sm font-medium">{day.date} ({day.weekday})</span>
                        </div>
                        <WeatherWidget
                          targetDateStr={day.fullDate}
                          lat={day.weatherParam.lat}
                          lon={day.weatherParam.lon}
                          city={day.weatherParam.city}
                          variant="compact"
                        />
                      </div>
                      <h3 className="font-serif-tc text-stone-800 font-bold text-lg mb-4 leading-snug min-h-[3.5rem]">
                        {day.title}
                      </h3>
                      <div className="flex items-start gap-2 text-stone-600 text-base font-medium pt-2 border-t border-stone-100">
                        <MapPin size={18} className="mt-0.5 shrink-0 text-stone-400" />
                        <span>{day.location}</span>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            </div>

            {/* --- TAB: DETAILED ITINERARY --- */}
            <div className={`space-y-8 md:space-y-16 ${activeTab === 'itinerary' ? 'block animate-in fade-in duration-500' : 'hidden'}`}>
              <div className="bg-white rounded-2xl border border-stone-200 shadow-sm p-4 md:p-5 scroll-reveal">
                <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
                  <div>
                    <h2 className="text-2xl md:text-3xl font-serif-tc text-stone-900">詳細行程</h2>
                    <p className="text-stone-500 mt-1">每一天都整理成「住宿、餐食、提醒、時間軸」四個層次，長輩比較好閱讀。</p>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    {itineraryData.map((day) => (
                      <button
                        key={`chip-${day.day}`}
                        onClick={() => document.getElementById(`day-${day.day}`)?.scrollIntoView({ behavior: 'smooth' })}
                        className="px-3 py-2 rounded-full bg-stone-100 hover:bg-pink-50 text-stone-700 hover:text-pink-700 font-bold text-sm md:text-base"
                      >
                        Day {day.day}
                      </button>
                    ))}
                  </div>
                </div>
              </div>
              {itineraryData.map((day, idx) => (
                <section key={day.day} id={`day-${day.day}`} className="relative scroll-mt-28 scroll-reveal">
                  
                  {/* Connecting Line */}
                  {idx !== itineraryData.length - 1 && (
                    <div className="hidden md:block absolute left-[2.75rem] top-28 bottom-[-4rem] w-1 bg-stone-200 z-0 rounded-full"></div>
                  )}

                  <div className="relative z-10 rounded-3xl shadow-md border border-stone-200 overflow-hidden">
                    
                    {/* Header - 柔和漸層 */}
                    <div className="bg-gradient-to-r from-stone-100 to-pink-50 px-4 md:px-10 pt-5 md:pt-8 pb-5 md:pb-6 border-b-2 border-stone-200">
                      <div className="flex flex-col lg:flex-row lg:items-end gap-4 md:gap-6">
                        <div className="flex-1">
                          <div className="flex items-center gap-3 mb-3">
                            <span className="bg-stone-800 text-white text-sm md:text-base font-bold px-4 py-1.5 rounded-full tracking-widest shadow-sm">
                              DAY {day.day}
                            </span>
                            <span className="text-pink-600 font-serif-tc text-lg tracking-widest font-bold">
                              {day.date} ({day.weekday})
                            </span>
                          </div>
                          <h2 className="text-3xl md:text-4xl font-serif-tc font-bold text-stone-900 leading-tight">
                            {day.title}
                          </h2>
                        </div>
                        <div className="shrink-0 pt-2 lg:pt-0">
                          {/* 氣象 Widget */}
                          <WeatherWidget 
                            targetDateStr={day.fullDate} 
                            lat={day.weatherParam.lat} 
                            lon={day.weatherParam.lon} 
                            city={day.weatherParam.city}
                          />
                        </div>
                      </div>
                    </div>

                    <div className="bg-white p-4 md:p-10">

                    {/* Highlights/Badges row */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5 mb-5 md:mb-8 bg-stone-50/80 rounded-2xl p-4 md:p-6 border border-stone-200">
                      <div className="flex items-start gap-4">
                        <div className="p-3 bg-white rounded-xl shadow-sm text-stone-600 border border-stone-100"><MapPin size={22} /></div>
                        <div>
                          <div className="text-sm text-stone-500 font-bold tracking-wider mb-1">住宿地點</div>
                          <div className="text-stone-800 text-lg font-bold">{day.accommodation}</div>
                        </div>
                      </div>
                      <div className="flex items-start gap-4">
                        <div className="p-3 bg-white rounded-xl shadow-sm text-stone-600 border border-stone-100"><Utensils size={22} /></div>
                        <div className="w-full">
                          <div className="text-sm text-stone-500 font-bold tracking-wider mb-2">重點餐飲</div>
                          <ul className="text-base text-stone-800 space-y-2 font-medium">
                            {day.meals.breakfast && (
                              <li className="flex items-start">
                                <span className="text-stone-400 mr-3 font-bold">早</span>
                                {day.meals.breakfast === "參考新潟早餐清單" ? (
                                  <button 
                                    onClick={() => {
                                      setActiveTab('info');
                                      setTimeout(() => {
                                        const el = document.getElementById('breakfast-list');
                                        if (el) el.scrollIntoView({ behavior: 'smooth' });
                                      }, 100);
                                    }}
                                    className="text-pink-700 underline underline-offset-4 decoration-2 hover:text-pink-900 transition-colors text-left"
                                  >
                                    {day.meals.breakfast}
                                  </button>
                                ) : (
                                  <span>{day.meals.breakfast}</span>
                                )}
                              </li>
                            )}
                            {day.meals.lunch && <li className="flex items-start"><span className="text-stone-400 mr-3 font-bold">午</span><span>{day.meals.lunch}</span></li>}
                            {day.meals.dinner && <li className="flex items-start"><span className="text-stone-400 mr-3 font-bold">晚</span><span>{day.meals.dinner}</span></li>}
                          </ul>
                        </div>
                      </div>
                    </div>

                    {/* Note block */}
                    {day.note && (
                      <div className="mb-6 md:mb-10 p-4 md:p-5 bg-pink-50/80 border-l-8 border-pink-400 rounded-r-xl text-base md:text-lg text-stone-800 font-medium flex items-start gap-3 md:gap-4 shadow-sm">
                        <Info size={24} className="text-pink-500 shrink-0 mt-0.5" />
                        <p className="leading-relaxed">{day.note}</p>
                      </div>
                    )}

                    {/* Content Area (Timeline + Side Image) */}
                    <div className="flex flex-col md:flex-row gap-6 md:gap-10 mt-5 md:mt-8">
                      {/* Side Image - 手機端排前面 */}
                      {day.image && (
                        <div className="w-full md:w-72 lg:w-80 shrink-0 order-first md:order-last">
                          <div className="md:sticky md:top-28 rounded-2xl overflow-hidden border border-stone-200 shadow-md aspect-[16/9] md:aspect-[3/4]">
                            <img src={day.image} alt="相關插圖" className="w-full h-full object-cover img-unified" />
                          </div>
                        </div>
                      )}
                      {/* Timeline */}
                      <div className="flex-1 space-y-5 md:space-y-8 order-last md:order-first">
                        {day.events.map((event, i) => (
                          <div key={i} className="flex gap-4 md:gap-6 group">
                            <div className="flex flex-col items-center">
                              <div className="text-[15px] md:text-lg font-extrabold text-stone-500 w-16 md:w-16 text-right pt-1">
                                {event.time}
                              </div>
                            </div>
                            <div className="flex flex-col items-center relative">
                              <div className={`w-3.5 h-3.5 rounded-full mt-2 z-10 ring-4 ring-white ${i === 0 || i === day.events.length - 1 ? 'bg-pink-500' : 'bg-stone-300'}`}></div>
                              {i !== day.events.length - 1 && (
                                <div className="absolute top-5 bottom-[-2rem] w-1 bg-stone-200 rounded-full"></div>
                              )}
                            </div>
                            <div className="pb-3 pt-0.5 flex-1">
                              <p className="text-stone-800 font-medium leading-relaxed text-[17px] md:text-lg">{event.desc}</p>
                            </div>
                          </div>
                        ))}
                        
                      </div>
                    </div>

                    {/* 返回行程總覽按鈕 */}
                    <div className="pt-4 pb-2 flex justify-center">
                      <button
                        onClick={() => {
                          setActiveTab('overview');
                          setTimeout(() => {
                            const el = document.getElementById('tab-content-start');
                            if (el) el.scrollIntoView({ behavior: 'smooth' });
                          }, 100);
                        }}
                        className="flex items-center gap-2 text-stone-600 hover:text-pink-700 font-bold text-base transition-all px-6 py-3 bg-stone-100 hover:bg-pink-50 rounded-full border border-stone-200 hover:border-pink-200 shadow-sm hover:shadow"
                      >
                        <ArrowLeft size={18} />
                        返回行程總覽
                      </button>
                    </div>

                    </div>{/* end bg-white body */}
                  </div>
                </section>
              ))}
            </div>

            {/* --- TAB: INFO & RESOURCES --- */}
            <div className={`space-y-6 md:space-y-10 ${activeTab === 'info' ? 'block animate-in fade-in duration-500' : 'hidden'}`}>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10 scroll-reveal">
                {/* Breakfast List */}
                <div id="breakfast-list" className="bg-white rounded-3xl p-6 md:p-10 border border-stone-200 shadow-md scroll-mt-28">
                  <div className="flex items-center gap-3 md:gap-4 mb-5 md:mb-8">
                    <Coffee className="text-pink-600" size={28} />
                    <h3 className="text-2xl font-serif-tc font-bold text-stone-900">新潟市區早餐備案</h3>
                  </div>
                  <ul className="space-y-4 md:space-y-5">
                    {breakfastOptions.map((opt, i) => (
                      <li key={i} className="flex flex-col sm:flex-row sm:justify-between sm:items-center border-b border-stone-100 pb-4 last:border-0 gap-2">
                        <a 
                          href={opt.url} 
                          target="_blank" 
                          rel="noopener noreferrer" 
                          className="text-stone-800 font-bold text-lg hover:text-pink-700 transition-colors underline-offset-4 decoration-2 hover:underline flex items-start gap-2"
                        >
                          <MapPin size={18} className="shrink-0 mt-1 text-stone-400" />
                          <span>{opt.name}</span>
                        </a>
                        <span className="text-sm font-bold text-stone-500 bg-stone-100 px-3 py-1.5 rounded-lg w-fit ml-6 sm:ml-0">{opt.desc}</span>
                      </li>
                    ))}
                  </ul>
                </div>

                {/* Todo List */}
                <div className="bg-white rounded-3xl p-6 md:p-10 border border-stone-200 shadow-md">
                  <div className="flex items-center gap-3 md:gap-4 mb-5 md:mb-8">
                    <Info className="text-pink-600" size={28} />
                    <h3 className="text-2xl font-serif-tc font-bold text-stone-900">行前須知與提醒</h3>
                  </div>
                  <ul className="space-y-4 md:space-y-5 text-lg text-stone-800 font-medium">
                    <li className="flex items-start gap-4">
                      <div className="mt-2 w-2.5 h-2.5 rounded-full bg-pink-500 shrink-0 shadow-sm"></div>
                      <span className="font-bold text-pink-700">日本購物限制攜帶白米4公斤以內(4人總額)，旅行社已洽國貿署申請許可，可攜回國重量大幅提升至12公斤。</span>
                    </li>
                    <li className="flex items-start gap-4">
                      <div className="mt-2 w-2.5 h-2.5 rounded-full bg-pink-500 shrink-0 shadow-sm"></div>
                      <span>確認手機eSIM或是網路漫遊已辦好</span>
                    </li>
                    <li className="flex items-start gap-4">
                      <div className="mt-2 w-2.5 h-2.5 rounded-full bg-pink-500 shrink-0 shadow-sm"></div>
                      <span>確認櫻花開花時間並微調行程</span>
                    </li>
                    <li className="flex items-start gap-4">
                      <div className="mt-2 w-2.5 h-2.5 rounded-full bg-pink-500 shrink-0 shadow-sm"></div>
                      <span>Visit Japan建檔</span>
                    </li>
                    <li className="flex items-start gap-4">
                      <div className="mt-2 w-2.5 h-2.5 rounded-full bg-pink-500 shrink-0 shadow-sm"></div>
                      <span>打包行李</span>
                    </li>
                    <li className="flex items-start gap-4">
                      <div className="mt-2 w-2.5 h-2.5 rounded-full bg-pink-500 shrink-0 shadow-sm"></div>
                      <span>天氣確認</span>
                    </li>
                  </ul>
                </div>
              </div>

              {/* Extras */}
              <div className="bg-white rounded-3xl p-6 md:p-10 mt-6 md:mt-10 shadow-md border border-stone-200 scroll-reveal">
                <h3 className="text-xl md:text-2xl font-serif-tc font-bold mb-4 md:mb-5 text-stone-900 flex items-center gap-3">
                  <MapPin size={24} className="text-pink-600" />
                  行程遺珠：Cave d'Occi Winery 卡夫多奇酒莊
                </h3>
                <p className="text-base md:text-lg leading-relaxed text-stone-600 font-medium">
                  位於新潟市區南方海濱、角田山腳下的美麗酒莊。擁有歐風庭園、溫泉與咖啡廳，適合品飲葡萄酒與享受下午茶時光。若行程有空檔可考慮前往（導覽需事先預約）。
                </p>
              </div>

            </div>

          </main>

          {/* 全域浮動回到頂部按鈕 */}
          <button
            onClick={() => {
              window.scrollTo({ top: 0, behavior: 'smooth' });
            }}
            className="fixed bottom-6 right-6 z-50 flex items-center justify-center w-12 h-12 text-white bg-stone-800/80 hover:bg-pink-700 backdrop-blur-sm rounded-full shadow-lg transition-all hover:scale-105"
            title="回到頂部"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>
          </button>
          
          <footer className="py-6 md:py-10 text-center text-stone-500 tracking-widest mt-8 md:mt-16 border-t-2 border-stone-200 space-y-4">
            <p className="text-sm font-medium">NIIGATA & TOKYO FAMILY ITINERARY © 2026</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
